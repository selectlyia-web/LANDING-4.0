name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo branch para economizar recursos.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Qualidade e build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Formatação
        run: npm run format:check

      - name: Testes
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Valores fictícios apenas para o build passar no CI — o build não
          # se conecta ao Supabase, só precisa que as variáveis existam.
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
